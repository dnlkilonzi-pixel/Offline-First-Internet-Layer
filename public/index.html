<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline-First Internet Layer</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --accent: #38bdf8;
      --green: #4ade80;
      --red: #f87171;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --radius: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.02em; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 999px;
      background: var(--border);
    }
    .badge .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }
    .badge.online .dot  { background: var(--green); }
    .badge.offline .dot { background: var(--red); }
    .badge.online  { color: var(--green); }
    .badge.offline { color: var(--red); }

    main {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 0;
      height: calc(100vh - 53px);
    }

    /* Sidebar */
    aside {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    aside h2 {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      padding: 14px 16px 8px;
    }
    #peers-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
      padding: 0 8px 8px;
    }
    #peers-list li {
      padding: 8px 10px;
      border-radius: var(--radius);
      font-size: 0.85rem;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    #peers-list li:hover { background: var(--border); }
    #peers-list .peer-id   { font-weight: 600; font-size: 0.8rem; color: var(--accent); word-break: break-all; }
    #peers-list .peer-addr { color: var(--muted); font-size: 0.75rem; }
    .empty-hint {
      padding: 12px 12px;
      color: var(--muted);
      font-size: 0.8rem;
      font-style: italic;
    }

    /* Chat area */
    .chat-area {
      display: flex;
      flex-direction: column;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .msg.mine {
      align-self: flex-end;
      background: #1d4ed8;
      border-color: #2563eb;
    }
    .msg-header {
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 4px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .msg-header .sender { font-weight: 700; color: var(--accent); }
    .msg-header .type-tag {
      background: var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 0.68rem;
    }
    .msg-body { font-size: 0.9rem; line-height: 1.5; }
    .synced-icon { margin-left: auto; font-size: 0.7rem; }

    /* Compose */
    .compose {
      border-top: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .compose-row { display: flex; gap: 10px; }
    .compose input, .compose select, .compose textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 8px 12px;
      font-size: 0.9rem;
      outline: none;
    }
    .compose input:focus, .compose select:focus, .compose textarea:focus {
      border-color: var(--accent);
    }
    .compose input[name=sender] { width: 180px; }
    .compose select { width: 160px; }
    .compose textarea {
      flex: 1;
      resize: none;
      height: 70px;
      font-family: inherit;
    }
    .compose button {
      background: var(--accent);
      color: #0f172a;
      border: none;
      border-radius: var(--radius);
      padding: 0 20px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.9rem;
      white-space: nowrap;
    }
    .compose button:hover { filter: brightness(1.1); }
    .compose button:disabled { opacity: 0.5; cursor: default; }

    /* Sync button */
    #sync-btn {
      margin-left: auto;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: var(--radius);
      padding: 5px 14px;
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
    }
    #sync-btn:hover { background: var(--border); }

    @media (max-width: 700px) {
      main { grid-template-columns: 1fr; }
      aside { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <h1>📡 Offline-First Internet Layer</h1>
    <span id="status-badge" class="badge offline">
      <span class="dot"></span>
      <span id="status-text">Checking…</span>
    </span>
    <button id="sync-btn" title="Push unsynced messages to remote server">⬆ Sync Now</button>
  </header>

  <main>
    <aside>
      <h2>🔗 Local Peers</h2>
      <ul id="peers-list">
        <li class="empty-hint">No peers found yet. Start another node on your LAN.</li>
      </ul>
    </aside>

    <div class="chat-area">
      <div id="messages"></div>

      <div class="compose">
        <div class="compose-row">
          <input name="sender" type="text" placeholder="Your name / device ID" value="Device-1" />
          <select name="type">
            <option value="general">💬 General</option>
            <option value="exam">📝 Exam / School</option>
            <option value="business">🏪 Business</option>
            <option value="emergency">🚨 Emergency</option>
          </select>
        </div>
        <div class="compose-row">
          <textarea name="content" placeholder="Type a message…"></textarea>
          <button id="send-btn">Send</button>
        </div>
      </div>
    </div>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const myName = () => document.querySelector('input[name=sender]').value.trim() || 'Anonymous';
    const messagesEl = document.getElementById('messages');
    const peersEl    = document.getElementById('peers-list');
    const statusBadge = document.getElementById('status-badge');
    const statusText  = document.getElementById('status-text');

    // ── Helpers ──────────────────────────────────────────────────────────────

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function renderMessage(msg) {
      const mine = msg.sender === myName();
      const div = document.createElement('div');
      div.className = 'msg' + (mine ? ' mine' : '');
      div.innerHTML = `
        <div class="msg-header">
          <span class="sender">${escapeHtml(msg.sender)}</span>
          <span class="type-tag">${escapeHtml(msg.type || 'general')}</span>
          <span>${new Date(msg.timestamp).toLocaleTimeString()}</span>
          <span class="synced-icon" title="${msg.synced ? 'Synced' : 'Pending sync'}">${msg.synced ? '✅' : '🔄'}</span>
        </div>
        <div class="msg-body">${escapeHtml(msg.content)}</div>
      `;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function renderPeers(peers) {
      if (peers.length === 0) {
        peersEl.innerHTML = '<li class="empty-hint">No peers found yet. Start another node on your LAN.</li>';
        return;
      }
      peersEl.innerHTML = peers.map((p) => `
        <li>
          <span class="peer-id">${escapeHtml(p.nodeId)}</span>
          <span class="peer-addr">${escapeHtml(p.ip)}:${p.apiPort}</span>
        </li>
      `).join('');
    }

    function setStatus(online) {
      statusBadge.className = 'badge ' + (online ? 'online' : 'offline');
      statusText.textContent = online ? 'Online' : 'Offline';
    }

    // ── Initial load ─────────────────────────────────────────────────────────

    async function loadMessages() {
      try {
        const msgs = await fetch('/api/messages').then((r) => r.json());
        msgs.slice().reverse().forEach(renderMessage);
      } catch (_) { /* offline */ }
    }

    async function loadStatus() {
      try {
        const s = await fetch('/api/status').then((r) => r.json());
        setStatus(s.online);
        renderPeers(s.peers);
      } catch (_) { /* offline */ }
    }

    loadMessages();
    loadStatus();

    // ── Socket events ─────────────────────────────────────────────────────────

    socket.on('message:new',   (msg) => renderMessage(msg));
    socket.on('status:change', (s)   => setStatus(s.online));
    socket.on('peer:new',      ()    => loadStatus());
    socket.on('peer:lost',     ()    => loadStatus());
    socket.on('sync:done',     ()    => {
      // Reload to show updated sync flags.
      messagesEl.innerHTML = '';
      loadMessages();
    });

    // ── Send ──────────────────────────────────────────────────────────────────

    document.getElementById('send-btn').addEventListener('click', sendMessage);
    document.querySelector('textarea[name=content]').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) sendMessage();
    });

    async function sendMessage() {
      const content = document.querySelector('textarea[name=content]').value.trim();
      const sender  = myName();
      const type    = document.querySelector('select[name=type]').value;
      if (!content) return;

      document.getElementById('send-btn').disabled = true;
      try {
        await fetch('/api/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content, sender, type }),
        });
        document.querySelector('textarea[name=content]').value = '';
      } finally {
        document.getElementById('send-btn').disabled = false;
      }
    }

    // ── Manual sync ───────────────────────────────────────────────────────────

    document.getElementById('sync-btn').addEventListener('click', async () => {
      const btn = document.getElementById('sync-btn');
      btn.textContent = '⬆ Syncing…';
      btn.disabled = true;
      try {
        const { results } = await fetch('/api/sync', { method: 'POST' }).then((r) => r.json());
        const ok = (results || []).filter((r) => r.ok).length;
        btn.textContent = results && results.length
          ? `✅ ${ok}/${results.length} synced`
          : '⬆ Sync Now';
      } catch (_) {
        btn.textContent = '❌ Sync failed';
      } finally {
        btn.disabled = false;
        setTimeout(() => { btn.textContent = '⬆ Sync Now'; }, 3000);
      }
    });
  </script>
</body>
</html>
